name: Update & deploy KeepUp

# Runs the full pipeline in the cloud — no local machine or Claude app needed:
# fetch new articles -> summarize them via the Claude API -> build -> deploy to Pages.
on:
  schedule:
    - cron: '7 13,21 * * *'   # ~twice daily (13:07 & 21:07 UTC). GitHub cron is best-effort.
  workflow_dispatch:            # manual runs from the Actions tab
    inputs:
      limit:
        description: 'Max articles to summarize this run'
        required: false
        default: '25'
      provider:
        description: 'Force summarizer provider (gemini | xai | anthropic); blank = auto'
        required: false
        default: ''

permissions:
  contents: write   # commit refreshed data/ and site/ back to the repo
  pages: write      # deploy to GitHub Pages
  id-token: write   # required by deploy-pages

concurrency:
  group: keepup-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch new articles
        run: node pipeline/fetch.js

      - name: Summarize new articles (Gemini / Grok / Claude)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUMMARIZE_PROVIDER: ${{ github.event.inputs.provider }}
        # Cap per run so it stays fast and within the free tier. Any remaining
        # backlog is drained by the next run; steady-state is ~15 new/run anyway.
        # Manual runs can pass a higher limit to drain a backlog in one go.
        run: node pipeline/summarize.js --limit ${{ github.event.inputs.limit || 50 }}

      - name: Build site
        run: node pipeline/build.js

      - name: Commit refreshed data & site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data site
          if git commit -m "chore: refresh news $(date -u +%FT%TZ) [skip ci]"; then
            # Push with retry. If main moved mid-run, rebase preferring THIS run's
            # freshly-generated files (-X theirs = the commits being replayed) so a
            # site/data conflict auto-resolves instead of failing the deploy.
            for i in 1 2 3; do
              if git pull --rebase -X theirs origin main && git push; then
                echo "pushed"; break
              fi
              git rebase --abort 2>/dev/null || true
              echo "push race, retry $i"; sleep 5
            done
          else
            echo "No changes to commit"
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - id: deploy
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # The Pages backend intermittently returns "try again later" on the first
      # attempt; a single retry clears it.
      - name: Retry deploy if the first attempt flaked
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4

name: Update & deploy KeepUp

# Runs the full pipeline in the cloud — no local machine or Claude app needed:
# fetch new articles -> summarize them via the Claude API -> build -> deploy to Pages.
on:
  schedule:
    - cron: '7 13,21 * * *'   # ~twice daily (13:07 & 21:07 UTC). GitHub cron is best-effort.
  workflow_dispatch: {}         # lets you run it manually from the Actions tab

permissions:
  contents: write   # commit refreshed data/ and site/ back to the repo
  pages: write      # deploy to GitHub Pages
  id-token: write   # required by deploy-pages

concurrency:
  group: keepup-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch new articles
        run: node pipeline/fetch.js

      - name: Summarize new articles (Gemini / Grok / Claude)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node pipeline/summarize.js

      - name: Build site
        run: node pipeline/build.js

      - name: Commit refreshed data & site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data site
          git commit -m "chore: refresh news $(date -u +%FT%TZ) [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - id: deploy
        uses: actions/deploy-pages@v4
